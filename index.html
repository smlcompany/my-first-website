<!DOCTYPE html>
<!-- 위 줄은 "이 문서는 HTML5(최신 웹 표준) 형식이다"라고 브라우저에 알려주는 선언문입니다 -->
<!-- 모든 HTML 파일의 맨 첫 줄에 반드시 있어야 합니다 -->

<html lang="ko">
<!-- html 태그: 웹페이지 전체를 감싸는 가장 큰 상자입니다 -->
<!-- lang="ko"는 "이 페이지는 한국어입니다"라는 뜻으로, 구글 검색과 번역기가 참고합니다 -->

<head>
    <!-- head 영역: 화면에는 안 보이지만 페이지의 설정 정보를 담는 곳입니다 (문서의 "표지"라고 생각하세요) -->

    <meta charset="UTF-8">
    <!-- charset="UTF-8": 한글이 깨지지 않게 해주는 문자 설정입니다 (한국어 페이지에 필수!) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 위 줄은 스마트폰에서 봤을 때도 글자가 깨지지 않고 잘 보이게 해주는 설정입니다 -->

    <title>(주)에스엠엘</title>
    <!-- title: 브라우저 탭 위쪽에 표시되는 제목입니다. 아래 "OO특수강"을 회사 이름으로 바꾸세요 -->
</head>

<body>
    <!-- ========== 네비게이션 바 시작 ========== -->
    <nav>
        <!-- nav 태그: navigation(네비게이션)의 줄임말. 페이지 이동 메뉴 영역임을 명시 -->
        <!-- 검색엔진과 화면낭독기가 "여기가 메뉴구나" 하고 이해합니다 -->

        <a href="index.html">홈</a> |
        <!-- href="index.html": 같은 폴더의 index.html로 이동 -->
        <!-- | 는 구분선(파이프 문자)입니다. 링크들을 시각적으로 나누기 위해 넣었어요 -->

        <a href="about.html">회사 소개</a> |
        <!-- about.html로 이동 -->

        <a href="contact.html">연락처</a>
        <!-- contact.html로 이동 -->
    </nav>
    <!-- ========== 네비게이션 바 끝 ========== -->

    <hr>
    <!-- hr 태그: horizontal rule(가로줄). 네비게이션 바와 본문을 시각적으로 구분 -->
    <!-- body 영역: 실제로 화면에 보이는 내용을 담는 곳입니다 (문서의 "본문") -->

    <h1>안녕하세요, (주)에스엠엘입니다</h1>
    <!-- h1 태그: 가장 큰 제목을 표시합니다 (heading 1의 줄임말) -->
    <!-- ⚠️ "OO특수강" 부분을 대표님 회사 이름으로 바꿔주세요 -->

    <p>집에서도 웹사이트를 수정할 수 있습니다.</p>
    <!-- p 태그: 일반 문단(paragraph) 텍스트를 표시합니다 -->
    <!-- 이 줄은 집 컴퓨터에서 처음 추가한 내용입니다 -->

</body>
</html>
