<!DOCTYPE html>
<!-- 이 문서는 HTML5 형식이다 라고 브라우저에 알림 -->

<html lang="ko">
<!-- 한국어 페이지임을 명시 (구글 검색·번역기가 참고함) -->

<head>
    <!-- head 영역: 화면엔 안 보이지만 페이지 설정 정보를 담는 곳 -->

    <meta charset="UTF-8">
    <!-- 한글이 깨지지 않게 하는 문자 설정 -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 스마트폰에서도 잘 보이게 하는 반응형 설정 -->

    <title>회사 소개 - (주)에스엠엘</title>
    <!-- 브라우저 탭 위쪽에 표시되는 제목 -->
    <!-- ⚠️ "OO특수강"을 실제 회사 이름으로 바꿔주세요 -->
</head>

<body>
    <body>

    <!-- ========== 네비게이션 바 시작 ========== -->
    <nav>
        <!-- nav 태그: navigation의 줄임말. 페이지 이동 메뉴 영역 -->

        <a href="index.html">홈</a> |
        <a href="about.html">회사 소개</a> |
        <a href="contact.html">연락처</a>
    </nav>
    <!-- ========== 네비게이션 바 끝 ========== -->

    <hr>
    <!-- hr 태그: 얇은 가로줄. 메뉴와 본문 구분 -->

    <!-- ↓ 아래는 원래 있던 회사 소개 내용 ↓ -->
    <h1>회사 소개</h1>
    <h2>우리 회사는</h2>
    ...
    (이 아래는 원래 있던 내용 그대로 유지)
    
    <!-- body 영역: 실제 화면에 보이는 내용 -->

    <h1>회사 소개</h1>
    <!-- h1 태그: 가장 큰 제목 (페이지의 대표 제목은 h1 하나만 쓰는 게 좋습니다) -->

    <h2>우리 회사는</h2>
    <!-- h2 태그: h1 다음으로 큰 소제목 (섹션 제목 용도) -->

    <p>
        저희 (주)에스엠엘은 고품질 특수강의 정밀 절단·유통 전문 기업입니다.
        축적된 기술력과 신뢰를 바탕으로 다양한 산업 현장에 
        안정적으로 소재를 공급하고 있습니다.
    </p>
    <!-- p 태그: 일반 문단 (paragraph) 텍스트 -->
    <!-- ⚠️ 회사 소개 내용은 대표님이 원하시는 문구로 바꾸셔도 됩니다 -->

    <h2>주요 취급 품목</h2>
    <!-- h2 소제목 두 번째 -->

    <ul>
        <!-- ul 태그: unordered list (순서 없는 목록, 검은 점으로 표시됨) -->
        <li>탄소강</li>
        <li>합금강</li>
        <li>공구강</li>
        <li>스테인리스강</li>
        <!-- li 태그: list item (목록 항목 하나) -->
        <!-- ⚠️ 실제 대표님 회사가 취급하는 품목으로 바꿔주세요 -->
    </ul>

    <h2>연혁</h2>

    <p>
        2024년: 회사 설립<br>
        2025년: 정밀 절단 설비 도입<br>
        2026년: 거래처 100개 돌파
    </p>
    <!-- ⚠️ 위 연혁은 예시입니다. 실제 정보로 바꾸시거나 지우셔도 됩니다 -->
    <!-- br 태그: 줄바꿈 (line break). p 태그 안에서 줄 나눌 때 씀 -->

</body>
</html>
